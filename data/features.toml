[[items]]
icon  = "🌐"
title = "Real Browser Automation"
desc  = "A persistent, headed browser handles full web automation — structural navigation, screenshot fallback, and persistent session state."

[[items]]
icon  = "💻"
title = "Write and Run Code"
desc  = "Agents write files, run bash commands with full stdout/stderr streaming, install packages, and send output files back to the UI."

[[items]]
icon  = "🧠"
title = "Persistent Memory"
desc  = "Agents store and retrieve keyed facts across conversations, preserved across session resets."

[[items]]
icon  = "🔗"
title = "Integrations"
desc  = "Connect Gmail and iCloud so agents can read, search, and send email. More integrations on the roadmap."

[[items]]
icon  = "📁"
title = "Full Filesystem Access"
desc  = "Read, write, edit, patch, grep, move. Agents work inside the shared file space you define — and only there."

[[items]]
icon  = "🛡"
title = "Container Isolated"
desc  = "Every agent runs inside a container. No access to your system beyond the shared space. Credentials live in an encrypted vault the agent never sees."
