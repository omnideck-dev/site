name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make arbor executable
        run: chmod +x ./arbor

      - name: Set base URL for GitHub Pages subpath
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          BASE_URL="https://${OWNER}.github.io/${REPO_NAME}"
          sed -i "s|base_url.*=.*|base_url    = \"${BASE_URL}\"|" config.toml
          echo "Base URL set to: ${BASE_URL}"

      - name: Build site
        run: ./arbor build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
